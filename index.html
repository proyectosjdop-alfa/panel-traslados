<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Traslados UTCD</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/js/all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --enee-yellow: #f1c40f;
            --success: #22c55e;
            --danger: #ef4444;
            --border: #334155;
        }
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-dark); color: white; margin: 0; padding: 20px; }

        /* LOGIN */
        #login-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-dark); z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .login-box { background: var(--card-bg); padding: 40px; border-radius: 15px; text-align: center; width: 360px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .login-box select, .login-box input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 0.9rem; }
        .logo-bg { background: white; padding: 12px; border-radius: 10px; display: inline-block; margin-bottom: 15px; }
        .logo-bg img { height: 65px; display: block; }
        .password-wrap { position: relative; }
        .password-wrap input { padding-right: 42px; }
        .eye-btn { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1rem; }
        .btn-login { width: 100%; padding: 13px; background: var(--accent); border: none; border-radius: 8px; font-weight: bold; cursor: pointer; color: #0f172a; font-size: 1rem; margin-top: 8px; }

        /* HEADER */
        .header-container { text-align: center; margin-bottom: 25px; }
        .header-container img { height: 90px; background: white; padding: 12px; border-radius: 12px; margin-bottom: 10px; }

        /* MÉTRICAS */
        .metrics-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 22px; }
        .metric-card { background: var(--card-bg); padding: 15px; border-radius: 12px; border-left: 5px solid var(--accent); }
        .metric-card h4 { margin: 0; font-size: 0.65rem; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
        .metric-card p { margin: 8px 0 0; font-size: 1.15rem; font-weight: bold; color: var(--enee-yellow); }

        /* PESTAÑAS */
        .tabs { display: flex; gap: 5px; margin-bottom: 18px; }
        .tab-btn { padding: 10px 28px; border: 2px solid var(--border); border-radius: 8px; background: var(--card-bg); color: #94a3b8; cursor: pointer; font-weight: bold; font-size: 0.85rem; transition: all 0.2s; }
        .tab-btn.active { border-color: var(--accent); color: var(--accent); background: #1e3a4a; }

        /* FILTROS */
        .filters-container { background: var(--card-bg); padding: 15px; border-radius: 12px; margin-bottom: 18px; display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 12px; align-items: end; }
        .filters-container label { display: block; font-size: 0.7rem; color: #94a3b8; font-weight: bold; text-transform: uppercase; margin-bottom: 4px; }
        .filters-container input, .filters-container select { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--border); background: #0f172a; color: white; font-size: 0.82rem; height: 36px; }
        .btn-limpiar { padding: 8px 14px; background: transparent; border: 1px solid var(--border); color: #94a3b8; border-radius: 6px; cursor: pointer; font-size: 0.8rem; height: 36px; width: 100%; }
        .btn-limpiar:hover { border-color: var(--accent); color: var(--accent); }

        /* BOTONES */
        .acciones-bar { display: flex; gap: 10px; margin-bottom: 15px; }
        .btn-excel { background: #166534; color: white; border: none; padding: 9px 18px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 7px; font-size: 0.85rem; }
        .btn-excel:hover { background: #15803d; }

        /* TABLA */
        .table-container { background: var(--card-bg); border-radius: 12px; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { padding: 13px 12px; background: #334155; color: var(--accent); font-size: 0.72rem; text-transform: uppercase; text-align: center; }
        td { padding: 11px 12px; border-bottom: 1px solid var(--border); font-size: 0.8rem; text-align: center; vertical-align: middle; }
        tr:hover td { background: #243447; }
        .btn-pdf { background: var(--danger); color: white; padding: 5px 10px; border-radius: 5px; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; font-size: 0.72rem; }
        .badge-sector { background: #1e3a4a; color: var(--accent); padding: 3px 8px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; }
        .empty-row td { color: #64748b; padding: 30px; font-style: italic; }

        /* ESTADOS */
        .estado-bloqueado { display: inline-block; padding: 5px 12px; border-radius: 6px; font-size: 0.72rem; font-weight: bold; }
        .estado-select { padding: 5px 8px; border-radius: 6px; border: none; font-size: 0.72rem; font-weight: bold; cursor: pointer; outline: none; }
        .estado-SOLICITADO   { background: #ef4444; color: white; }
        .estado-ANULADO      { background: #eab308; color: #000; }
        .estado-ENTREGADO    { background: #22c55e; color: white; }
        .estado-TRASLADADO   { background: #ef4444; color: white; }

        /* LOADING */
        .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login-overlay">
    <div class="login-box">
        <div class="logo-bg">
            <img src="https://raw.githubusercontent.com/proyectosjdop-alfa/traslado_materiales/refs/heads/main/imagenes/UTCD%20Vertical.png">
        </div>
        <h3 style="color:var(--enee-yellow); margin:0 0 15px;">Panel de Traslados</h3>
        <select id="select-sector">
            <option value="">SELECCIONE SECTOR</option>
            <option value="ADMIN">ADMIN CENTRAL</option>
            <option value="BRUS LAGUNA">BRUS LAGUNA</option>
            <option value="CHOLUTECA">CHOLUTECA</option>
            <option value="COMAYAGUA">COMAYAGUA</option>
            <option value="DANLI">DANLI</option>
            <option value="EL PROGRESO">EL PROGRESO</option>
            <option value="JUTICALPA">JUTICALPA</option>
            <option value="LA CEIBA">LA CEIBA</option>
            <option value="SAN PEDRO SULA">SAN PEDRO SULA</option>
            <option value="SANTA BARBARA">SANTA BARBARA</option>
            <option value="SANTA ROSA">SANTA ROSA</option>
            <option value="SANTA CRUZ">SANTA CRUZ</option>
            <option value="TEGUCIGALPA">TEGUCIGALPA</option>
            <option value="TOCOA">TOCOA</option>
        </select>
        <div class="password-wrap">
            <input type="password" id="pass-sector" placeholder="Contraseña" onkeydown="if(event.key==='Enter') validarAcceso()">
            <button class="eye-btn" onclick="togglePass()"><i id="eye-i" class="fas fa-eye"></i></button>
        </div>
        <button class="btn-login" onclick="validarAcceso()">INGRESAR</button>
        <p id="login-error" style="display:none; color:var(--danger); font-size:0.85rem; margin-top:10px;">Contraseña incorrecta</p>
    </div>
</div>

<!-- PANEL PRINCIPAL -->
<div id="panel-content" style="display:none;">

    <div class="header-container">
        <img src="https://raw.githubusercontent.com/proyectosjdop-alfa/traslado_materiales/refs/heads/main/imagenes/UTCD%20Vertical%20.png">
        <h2 id="titulo-sector" style="color:var(--enee-yellow); margin:5px 0 0;">SECTOR: ---</h2>
    </div>

    <!-- MÉTRICAS -->
    <div class="metrics-grid">
        <div class="metric-card">
            <h4>Total Traslados</h4>
            <p id="m-traslados">0</p>
        </div>
        <div class="metric-card" style="border-left-color:#a855f7">
            <h4>Total Solicitudes</h4>
            <p id="m-solicitudes">0</p>
        </div>
        <div class="metric-card" style="border-left-color:#22c55e">
            <h4>Cuadrillas Activas</h4>
            <p id="m-cuadrillas">0</p>
        </div>
        <div class="metric-card" style="border-left-color:#f59e0b">
            <h4>Último Registro</h4>
            <p id="m-ultimo" style="font-size:0.85rem;">---</p>
        </div>
    </div>

    <!-- PESTAÑAS -->
    <div class="tabs">
        <button class="tab-btn active" id="tab-traslados" onclick="cambiarTab('traslados')">
            <i class="fas fa-truck"></i> TRASLADOS
        </button>
        <button class="tab-btn" id="tab-solicitudes" onclick="cambiarTab('solicitudes')">
            <i class="fas fa-clipboard-list"></i> SOLICITUDES
        </button>
    </div>

    <!-- FILTROS TRASLADOS -->
    <div id="filtros-traslados" class="filters-container">
        <div>
            <label>Fecha Desde</label>
            <input type="date" id="t-fecha-desde" onchange="filtrar('traslados')">
        </div>
        <div>
            <label>Fecha Hasta</label>
            <input type="date" id="t-fecha-hasta" onchange="filtrar('traslados')">
        </div>
        <div>
            <label>Cuadrilla</label>
            <select id="t-cuadrilla" onchange="filtrar('traslados')">
                <option value="">TODAS</option>
            </select>
        </div>
        <div>
            <label>Encargado</label>
            <select id="t-encargado" onchange="filtrar('traslados')">
                <option value="">TODOS</option>
            </select>
        </div>
        <div>
            <label>&nbsp;</label>
            <button class="btn-limpiar" onclick="limpiarFiltros('traslados')">
                <i class="fas fa-times"></i> Limpiar filtros
            </button>
        </div>
    </div>

    <!-- FILTROS SOLICITUDES -->
    <div id="filtros-solicitudes" class="filters-container" style="display:none;">
        <div>
            <label>Fecha Desde</label>
            <input type="date" id="s-fecha-desde" onchange="filtrar('solicitudes')">
        </div>
        <div>
            <label>Fecha Hasta</label>
            <input type="date" id="s-fecha-hasta" onchange="filtrar('solicitudes')">
        </div>
        <div>
            <label>Cuadrilla</label>
            <select id="s-cuadrilla" onchange="filtrar('solicitudes')">
                <option value="">TODAS</option>
            </select>
        </div>
        <div>
            <label>&nbsp;</label>
            <button class="btn-limpiar" onclick="limpiarFiltros('solicitudes')">
                <i class="fas fa-times"></i> Limpiar filtros
            </button>
        </div>
    </div>

    <!-- BARRA ACCIONES -->
    <div class="acciones-bar">
        <button class="btn-excel" onclick="exportarExcel()">
            <i class="fas fa-file-excel"></i> Exportar Excel
        </button>
    </div>

    <!-- TABLA TRASLADOS -->
    <div id="tabla-traslados-wrap" class="table-container">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Fecha</th>
                    <th>Sector</th>
                    <th>Encargado que Asigna</th>
                    <th>Cuadrilla que Recibe</th>
                    <th>Estado</th>
                    <th>PDF</th>
                </tr>
            </thead>
            <tbody id="tbody-traslados">
                <tr><td colspan="7" style="text-align:center; padding:30px;">
                    <div class="spinner"></div><br><span style="color:#64748b;">Cargando datos...</span>
                </td></tr>
            </tbody>
        </table>
    </div>

    <!-- TABLA SOLICITUDES -->
    <div id="tabla-solicitudes-wrap" class="table-container" style="display:none;">
        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Fecha</th>
                    <th>Sector</th>
                    <th>Cuadrilla Solicitante</th>
                    <th>Estado</th>
                    <th>PDF</th>
                </tr>
            </thead>
            <tbody id="tbody-solicitudes">
                <tr><td colspan="6" style="text-align:center; padding:30px;">
                    <div class="spinner"></div><br><span style="color:#64748b;">Cargando datos...</span>
                </td></tr>
            </tbody>
        </table>
    </div>

</div>

<script>
    const WORKER_URL = "https://traslados-api.proyectos-jdop.workers.dev";

    const PASS = {
        "ADMIN": "admin2026",
        "BRUS LAGUNA": "enee2026", "CHOLUTECA": "enee2026", "COMAYAGUA": "enee2026",
        "DANLI": "enee2026", "EL PROGRESO": "enee2026", "JUTICALPA": "enee2026",
        "LA CEIBA": "enee2026", "SAN PEDRO SULA": "enee2026", "SANTA BARBARA": "enee2026",
        "SANTA ROSA": "enee2026", "SANTA CRUZ": "enee2026", "TEGUCIGALPA": "enee2026",
        "TOCOA": "enee2026"
    };

    let sectorSesion = "";
    let datosTraslados   = [];
    let datosSolicitudes = [];
    let tabActiva = "traslados";

    // ── OJO CONTRASEÑA ───────────────────────────────────────────────────────
    function togglePass() {
        const inp = document.getElementById('pass-sector');
        const ico = document.getElementById('eye-i');
        inp.type = inp.type === 'password' ? 'text' : 'password';
        ico.classList.toggle('fa-eye');
        ico.classList.toggle('fa-eye-slash');
    }

    // ── LOGIN ────────────────────────────────────────────────────────────────
    function validarAcceso() {
        const s   = document.getElementById('select-sector').value;
        const p   = document.getElementById('pass-sector').value;
        const err = document.getElementById('login-error');
        if (s && PASS[s] && p === PASS[s]) {
            err.style.display = 'none';
            sectorSesion = s;
            document.getElementById('login-overlay').style.display = 'none';
            document.getElementById('panel-content').style.display = 'block';
            document.getElementById('titulo-sector').innerText = `SECTOR: ${s}`;
            cargarDatos();
        } else {
            err.style.display = 'block';
            document.getElementById('pass-sector').value = '';
        }
    }

    // ── CARGA DE DATOS ───────────────────────────────────────────────────────
    async function cargarDatos() {
        try {
            const [resT, resS] = await Promise.all([
                fetch(`${WORKER_URL}/traslados?sector=${encodeURIComponent(sectorSesion)}`),
                fetch(`${WORKER_URL}/solicitudes?sector=${encodeURIComponent(sectorSesion)}`)
            ]);
            datosTraslados   = await resT.json();
            datosSolicitudes = await resS.json();

            poblarFiltros();
            actualizarMetricas();
            filtrar('traslados');
            filtrar('solicitudes');
        } catch (e) {
            console.error(e);
            document.getElementById('tbody-traslados').innerHTML   =
                '<tr class="empty-row"><td colspan="6">❌ Error al conectar con el servidor</td></tr>';
            document.getElementById('tbody-solicitudes').innerHTML =
                '<tr class="empty-row"><td colspan="5">❌ Error al conectar con el servidor</td></tr>';
        }
    }

    // ── POBLAR FILTROS DESPLEGABLES ──────────────────────────────────────────
    function poblarFiltros() {
        const cuadT = [...new Set(datosTraslados.map(r => r.cuadrilla_recibe).filter(Boolean))].sort();
        const encT  = [...new Set(datosTraslados.map(r => r.encargado).filter(Boolean))].sort();
        const cuadS = [...new Set(datosSolicitudes.map(r => r.cuadrilla_solicita).filter(Boolean))].sort();

        const llenar = (id, vals) => {
            const el = document.getElementById(id);
            el.innerHTML = '<option value="">TODAS</option>';
            vals.forEach(v => el.innerHTML += `<option value="${v}">${v.toUpperCase()}</option>`);
        };
        llenar('t-cuadrilla', cuadT);
        llenar('t-encargado', encT);
        llenar('s-cuadrilla', cuadS);
    }

    // ── MÉTRICAS ─────────────────────────────────────────────────────────────
    function actualizarMetricas() {
        const cuadrillasUnicas = new Set([
            ...datosTraslados.map(r => r.cuadrilla_recibe),
            ...datosSolicitudes.map(r => r.cuadrilla_solicita)
        ]);
        document.getElementById('m-traslados').innerText   = datosTraslados.length;
        document.getElementById('m-solicitudes').innerText = datosSolicitudes.length;
        document.getElementById('m-cuadrillas').innerText  = cuadrillasUnicas.size;

        // El más reciente entre traslados y solicitudes
        const fechas = [
            ...datosTraslados.map(r => r.fecha),
            ...datosSolicitudes.map(r => r.fecha)
        ].filter(Boolean).sort().reverse();
        document.getElementById('m-ultimo').innerText = fechas[0] || '---';
    }

    // ── CAMBIAR PESTAÑA ──────────────────────────────────────────────────────
    function cambiarTab(tab) {
        tabActiva = tab;
        document.getElementById('tab-traslados').classList.toggle('active', tab === 'traslados');
        document.getElementById('tab-solicitudes').classList.toggle('active', tab === 'solicitudes');
        document.getElementById('filtros-traslados').style.display      = tab === 'traslados'   ? 'grid'  : 'none';
        document.getElementById('filtros-solicitudes').style.display    = tab === 'solicitudes' ? 'grid'  : 'none';
        document.getElementById('tabla-traslados-wrap').style.display   = tab === 'traslados'   ? 'block' : 'none';
        document.getElementById('tabla-solicitudes-wrap').style.display = tab === 'solicitudes' ? 'block' : 'none';
    }

    // ── FILTRAR Y RENDERIZAR ─────────────────────────────────────────────────
    function filtrar(tipo) {
        if (tipo === 'traslados') {
            const desde     = document.getElementById('t-fecha-desde').value;
            const hasta     = document.getElementById('t-fecha-hasta').value;
            const cuadrilla = document.getElementById('t-cuadrilla').value;
            const encargado = document.getElementById('t-encargado').value;
            const tbody     = document.getElementById('tbody-traslados');

            const filtrados = datosTraslados.filter(r => {
                const f = r.fecha || '';
                if (desde && f < desde) return false;
                if (hasta && f > hasta) return false;
                if (cuadrilla && r.cuadrilla_recibe !== cuadrilla) return false;
                if (encargado && r.encargado !== encargado) return false;
                return true;
            });

            if (filtrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; color:#64748b; padding:30px; font-style:italic;">No hay registros con los filtros seleccionados</td></tr>';
                return;
            }
            tbody.innerHTML = filtrados.map((r, i) => {
                const estado = r.estado || 'ENTREGADO';
                const bloqueado = estado === 'TRASLADADO EN ENERGIS';
                const colorClass = bloqueado ? 'estado-TRASLADADO' : (estado === 'ENTREGADO' ? 'estado-ENTREGADO' : '');
                const celdaEstado = bloqueado
                    ? `<span class="estado-bloqueado estado-TRASLADADO">TRASLADADO EN ENERGIS</span>`
                    : `<select class="estado-select estado-${estado.replace(/\s+/g,'_')}"
                            onchange="cambiarEstadoTraslado(this, ${r.id})"
                            style="${estado==='ENTREGADO' ? 'background:#22c55e;color:white;' : 'background:#38bdf8;color:#0f172a;'}">
                          <option value="ENTREGADO" ${estado==='ENTREGADO'?'selected':''}>ENTREGADO</option>
                          <option value="TRASLADADO EN ENERGIS" ${estado==='TRASLADADO EN ENERGIS'?'selected':''}>TRASLADADO EN ENERGIS</option>
                       </select>`;
                return `<tr>
                    <td style="color:#64748b">${i + 1}</td>
                    <td>${r.fecha || '---'}</td>
                    <td><span class="badge-sector">${(r.sector || '---').toUpperCase()}</span></td>
                    <td>${r.encargado || '---'}</td>
                    <td style="font-weight:bold; color:var(--enee-yellow)">${r.cuadrilla_recibe || '---'}</td>
                    <td>${celdaEstado}</td>
                    <td>${r.pdf_url
                        ? `<a href="${r.pdf_url}" target="_blank" class="btn-pdf"><i class="fas fa-file-pdf"></i> Ver PDF</a>`
                        : '<span style="color:#64748b">Sin PDF</span>'}</td>
                </tr>`;
            }).join('');

        } else {
            const desde     = document.getElementById('s-fecha-desde').value;
            const hasta     = document.getElementById('s-fecha-hasta').value;
            const cuadrilla = document.getElementById('s-cuadrilla').value;
            const tbody     = document.getElementById('tbody-solicitudes');

            const filtrados = datosSolicitudes.filter(r => {
                const f = r.fecha || '';
                if (desde && f < desde) return false;
                if (hasta && f > hasta) return false;
                if (cuadrilla && r.cuadrilla_solicita !== cuadrilla) return false;
                return true;
            });

            if (filtrados.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; color:#64748b; padding:30px; font-style:italic;">No hay registros con los filtros seleccionados</td></tr>';
                return;
            }
            tbody.innerHTML = filtrados.map((r, i) => {
                const estado = r.estado || 'SOLICITADO';
                const bloqueado = estado === 'ENTREGADO';
                const celdaEstado = bloqueado
                    ? `<span class="estado-bloqueado estado-ENTREGADO">ENTREGADO</span>`
                    : `<select class="estado-select"
                            onchange="cambiarEstadoSolicitud(this, ${r.id})"
                            style="${estado==='ANULADO' ? 'background:#eab308;color:#000;' : 'background:#ef4444;color:white;'}">
                          <option value="SOLICITADO" ${estado==='SOLICITADO'?'selected':''}>SOLICITADO</option>
                          <option value="ANULADO"    ${estado==='ANULADO'?'selected':''}>ANULADO</option>
                          <option value="ENTREGADO"  ${estado==='ENTREGADO'?'selected':''}>ENTREGADO</option>
                       </select>`;
                return `<tr>
                    <td style="color:#64748b">${i + 1}</td>
                    <td>${r.fecha || '---'}</td>
                    <td><span class="badge-sector">${(r.sector || '---').toUpperCase()}</span></td>
                    <td style="font-weight:bold; color:var(--enee-yellow)">${r.cuadrilla_solicita || '---'}</td>
                    <td>${celdaEstado}</td>
                    <td>${r.pdf_url
                        ? `<a href="${r.pdf_url}" target="_blank" class="btn-pdf"><i class="fas fa-file-pdf"></i> Ver PDF</a>`
                        : '<span style="color:#64748b">Sin PDF</span>'}</td>
                </tr>`;
            }).join('');
        }
    }

    // ── LIMPIAR FILTROS ──────────────────────────────────────────────────────
    function limpiarFiltros(tipo) {
        if (tipo === 'traslados') {
            ['t-fecha-desde','t-fecha-hasta','t-cuadrilla','t-encargado']
                .forEach(id => document.getElementById(id).value = '');
        } else {
            ['s-fecha-desde','s-fecha-hasta','s-cuadrilla']
                .forEach(id => document.getElementById(id).value = '');
        }
        filtrar(tipo);
    }

    // ── CAMBIAR ESTADO TRASLADO (solo local, sin BD) ─────────────────────────
    function cambiarEstadoTraslado(el, id) {
        const nuevoEstado = el.value;
        const esFinal = nuevoEstado === 'TRASLADADO EN ENERGIS';
        const msg = esFinal
            ? `¿Confirmar "${nuevoEstado}"?\n\n⚠️ Este estado es DEFINITIVO en esta sesión.`
            : `¿Confirmar cambio a "${nuevoEstado}"?`;
        if (!confirm(msg)) { el.value = el.dataset.prev || 'ENTREGADO'; return; }
        el.dataset.prev = nuevoEstado;

        // Actualizar color
        if (nuevoEstado === 'ENTREGADO') {
            el.style.background = '#22c55e'; el.style.color = 'white';
        } else {
            el.style.background = '#ef4444'; el.style.color = 'white';
        }
        // Si es final, bloquear visualmente
        if (esFinal) {
            el.parentElement.innerHTML = `<span class="estado-bloqueado estado-TRASLADADO">TRASLADADO EN ENERGIS</span>`;
        }
        // Actualizar en memoria
        const reg = datosTraslados.find(r => r.id === id);
        if (reg) reg.estado = nuevoEstado;
    }

    // ── CAMBIAR ESTADO SOLICITUD (solo local, sin BD) ─────────────────────────
    function cambiarEstadoSolicitud(el, id) {
        const nuevoEstado = el.value;
        const esFinal = nuevoEstado === 'ENTREGADO';
        const msg = esFinal
            ? `¿Confirmar "${nuevoEstado}"?\n\n⚠️ Este estado es DEFINITIVO en esta sesión.`
            : `¿Confirmar cambio a "${nuevoEstado}"?`;
        if (!confirm(msg)) { el.value = el.dataset.prev || 'SOLICITADO'; return; }
        el.dataset.prev = nuevoEstado;

        // Actualizar color
        if (nuevoEstado === 'ANULADO') {
            el.style.background = '#eab308'; el.style.color = '#000';
        } else if (nuevoEstado === 'SOLICITADO') {
            el.style.background = '#ef4444'; el.style.color = 'white';
        }
        // Si es final, bloquear visualmente
        if (esFinal) {
            el.parentElement.innerHTML = `<span class="estado-bloqueado estado-ENTREGADO">ENTREGADO</span>`;
        }
        // Actualizar en memoria
        const reg = datosSolicitudes.find(r => r.id === id);
        if (reg) reg.estado = nuevoEstado;
    }

    function exportarExcel() {
        const datos = tabActiva === 'traslados' ? datosTraslados : datosSolicitudes;
        if (datos.length === 0) return alert("No hay datos para exportar");
        const ws = XLSX.utils.json_to_sheet(datos);
        const wb = XLSX.utils.book_new();
        const hoja = tabActiva === 'traslados' ? "Traslados" : "Solicitudes";
        XLSX.utils.book_append_sheet(wb, ws, hoja);
        const fecha = new Date().toLocaleDateString('es-HN').replace(/\//g, '-');
        XLSX.writeFile(wb, `${hoja}_${sectorSesion}_${fecha}.xlsx`);
    }
</script>
</body>
